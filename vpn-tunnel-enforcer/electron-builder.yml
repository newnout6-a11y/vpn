# appId is the AppUserModelID Windows uses to correlate Start Menu shortcuts
# with toast notifications. Must match `APP_USER_MODEL_ID` in
# src/main/index.ts (passed to app.setAppUserModelId) and the candidate list
# in src/main/notifications.ts. If these drift, Windows can't find the app
# in Settings → Notifications and the registry-based block check / clear
# will look at the wrong AUMID.
appId: com.vpntunnelenforcer.app
productName: VPN Tunnel Enforcer
directories:
  output: dist
electronDist: node_modules/electron/dist
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
  requestedExecutionLevel: requireAdministrator
nsis:
  artifactName: VPN-Tunnel-Enforcer-Setup-${version}.${ext}
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  # Custom hooks (build/installer.nsh): auto-close the running app + our
  # sing-box runtime before install/uninstall, and clear the stale
  # server-groups cache so the per-subscription migration re-runs. This is
  # what makes the upgrade fully self-service — the user just runs setup.
  include: build/installer.nsh
  # On upgrade, run the previous version's uninstaller automatically and wait
  # for it, so the user never has to "uninstall first". Keep user data
  # (settings, keys) — we only clear the group cache in customInstall.
  deleteAppDataOnUninstall: false
  # Both shortcuts are required so Windows treats us as a "real installed
  # app" and keeps our entry in Settings → Notifications even after the
  # user blocks toasts. Without a Start Menu shortcut tied to the AUMID,
  # Windows can drop us from the list once the block is applied.
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: VPN Tunnel Enforcer
portable:
  artifactName: VPN-Tunnel-Enforcer-${version}.${ext}
extraResources:
  - from: resources/sing-box.exe
    to: sing-box.exe
  - from: resources/wintun.dll
    to: wintun.dll
  - from: resources/icon.ico
    to: icon.ico
  # Smart-RU split rule-sets, bundled so sing-box loads them locally (type:
  # local) with no network dependency at startup. A remote rule-set whose
  # initial download fails is a FATAL sing-box error that takes the whole
  # tunnel down — bundling removes that failure mode entirely.
  - from: resources/geoip-ru.srs
    to: geoip-ru.srs
  - from: resources/geosite-category-gov-ru.srs
    to: geosite-category-gov-ru.srs
files:
  - out/**/*
  - package.json
asar: true
