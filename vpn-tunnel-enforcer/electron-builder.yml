# appId is the AppUserModelID Windows uses to correlate Start Menu shortcuts
# with toast notifications. Must match `APP_USER_MODEL_ID` in
# src/main/index.ts (passed to app.setAppUserModelId) and the candidate list
# in src/main/notifications.ts. If these drift, Windows can't find the app
# in Settings → Notifications and the registry-based block check / clear
# will look at the wrong AUMID.
appId: com.vpntunnelenforcer.app
productName: VPN Tunnel Enforcer
directories:
  output: dist
electronDist: node_modules/electron/dist
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
  requestedExecutionLevel: requireAdministrator
nsis:
  artifactName: VPN-Tunnel-Enforcer-Setup-${version}.${ext}
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  # Both shortcuts are required so Windows treats us as a "real installed
  # app" and keeps our entry in Settings → Notifications even after the
  # user blocks toasts. Without a Start Menu shortcut tied to the AUMID,
  # Windows can drop us from the list once the block is applied.
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: VPN Tunnel Enforcer
portable:
  artifactName: VPN-Tunnel-Enforcer-${version}.${ext}
extraResources:
  - from: resources/sing-box.exe
    to: sing-box.exe
  - from: resources/wintun.dll
    to: wintun.dll
  - from: resources/icon.ico
    to: icon.ico
files:
  - out/**/*
  - package.json
asar: true
